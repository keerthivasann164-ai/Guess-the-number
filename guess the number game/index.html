<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Guessing Game</title>

  <!-- Link to our external CSS file -->
  <link rel="stylesheet" href="style.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- =============================================
       MAIN GAME CARD
  ============================================= -->
  <div class="card">

    <!-- Title -->
    <h1 class="game-title">🎯 Guess the Number!</h1>
    <p class="game-subtitle">A simple & fun guessing game</p>

    <!-- Range badge -->
    <div class="range-badge">
      🔢 Pick a number between <strong>1</strong> and <strong>100</strong>
    </div>

    <!-- Input + Guess button -->
    <div class="input-row">
      <input
        type="number"
        id="guessInput"
        placeholder="Enter your guess…"
        min="1"
        max="100"
      />
      <button class="btn btn-guess" id="guessBtn">Guess!</button>
    </div>

    <!-- Feedback message -->
    <div class="message-box idle" id="messageBox">
      Make your first guess! 🤔
    </div>

    <!-- Attempts counter -->
    <div class="attempts-row">
      <span>Attempts used:</span>
      <span class="attempts-count" id="attemptsCount">0</span>
    </div>

    <!-- Guess history -->
    <div class="history-label">Your guesses:</div>
    <div class="history" id="history"></div>

    <!-- Restart button -->
    <button class="btn btn-restart" id="restartBtn">🔄 Restart Game</button>

  </div>

  <!-- Link to our external JavaScript file (always at the bottom of body) -->
  <script src="script.js"></script>

</body>
</html>
